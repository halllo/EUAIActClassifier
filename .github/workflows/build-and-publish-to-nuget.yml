# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build and Publish to NuGet

on:
  push:
    branches: [ "main" ]
    paths:
      - 'EUAIActClassifier/**'

jobs:
  build:
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for trusted publishing

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # GitVersion needs full history to compute the version

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.5.0
      with:
        versionSpec: '6.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.5.0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ./EUAIActClassifier/EUAIActClassifier.csproj

    - name: Build
      run: dotnet build ./EUAIActClassifier/EUAIActClassifier.csproj /p:Version=${{ steps.gitversion.outputs.majorMinorPatch }} --configuration Release --no-restore

    - name: Pack
      run: dotnet pack ./EUAIActClassifier/EUAIActClassifier.csproj /p:PackageVersion=${{ steps.gitversion.outputs.semVer }} --no-restore --configuration Release --output nupkgs

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push to NuGet
      run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
